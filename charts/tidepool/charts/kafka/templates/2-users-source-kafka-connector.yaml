{{ if and .Values.global.kafka.connect.enabled .Values.global.kafka.connect.keycloak.enabled}}
{{- $realm := .Values.keycloak.realm -}}
{{ if not .Values.keycloak.realm }}
  {{- $realm = .Release.Namespace -}}
{{ end}}
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  labels:
    app: users-source
    strimzi.io/cluster: {{ .Release.Namespace }}-{{ .Values.global.kafka.connect.clusterName }}
  name: users-source
  namespace: {{ .Release.Namespace }}
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  config:
    tasks.max: 1
    plugin.name: 'wal2json'
    database.hostname: '${directory:/opt/kafka/external-configuration/keycloak-config:Hostname}'
    database.port: '${directory:/opt/kafka/external-configuration/keycloak-config:Port}'
    database.user: '${directory:/opt/kafka/external-configuration/keycloak-config:User}'
    database.password: '${directory:/opt/kafka/external-configuration/keycloak-config:Password}'
    database.dbname: '${directory:/opt/kafka/external-configuration/keycloak-config:Database}'
    database.server.name: {{ .Release.Namespace }}.keycloak
    key.converter: 'org.apache.kafka.connect.json.JsonConverter'
    key.converter.schemas.enable: false
    value.converter: 'org.apache.kafka.connect.json.JsonConverter'
    value.converter.schemas.enable: false
    snapshot.mode: {{ .Values.keycloak.snapshotMode }}
    table.include.list: 'public.tp_debezium_lsn_heartbeat,public.user_entity,public.user_role_mapping,public.keycloak_role,public.user_attribute'
    transforms: 'filter,filter_user_attr'
    transforms.filter.type: 'io.debezium.transforms.Filter'
    transforms.filter.language: 'jsr223.groovy'
    transforms.filter.topic.regex: '.+\.public.(user_entity|keycloak_role)'
    transforms.filter.condition: "value.op && (((value.op == 'r' || value.op == 'c' || value.op == 'u') && (value.after && value.after.realm_id && value.after.realm_id == '{{ $realm }}')) || (value.op == 'd'))"
    transforms.filter_user_attr.type: 'io.debezium.transforms.Filter'
    transforms.filter_user_attr.language: 'jsr223.groovy'
    transforms.filter_user_attr.topic.regex: '.+\.public.(user_attribute)'
    transforms.filter_user_attr.condition: "value.op && ((value.op == 'r' || value.op == 'c' || value.op == 'u') && value?.after?.name != null && value.after.name == 'terms_and_conditions')"
    # periodic heartbeat for the source connector's offsets
    heartbeat.interval.ms: {{ .Values.global.kafka.connect.postgresHeartbeatIntervalMs }}
    # periodic heartbeat to advance the replication slot's LSN to keep WAL from
    # growing excessively large from modifications to busier tables than the
    # ones this connector is capturing.
    # Hearbeat table created as `CREATE TABLE IF NOT EXISTS public.tp_debezium_lsn_heartbeat(id INT PRIMARY KEY, last_updated TIMESTAMPTZ);`
    # Add table to publication if not using all tables.
    heartbeat.action.query: "INSERT INTO public.tp_debezium_lsn_heartbeat(id, last_updated) VALUES (1, NOW()) ON CONFLICT (id) DO UPDATE SET last_updated = EXCLUDED.last_updated"
  tasksMax: 1
{{- end }}
